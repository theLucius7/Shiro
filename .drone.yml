# demo.lucius7.dev uses this self-hosted pipeline for debugging.
# blog.lucius7.dev is deployed separately by Vercel from the Git repository.
kind: pipeline
name: demo-build-and-package
platform:
  os: linux
  arch: amd64

volumes:
  - name: shiro-dist
    host:
      path: /drone/tmp/shiro-dist
  - name: shiro-env
    host:
      path: /home/innei/docker-compose/drone/public/shiro/.env

  - name: node_modules_cache
    host:
      path: /drone/tmp/cache

steps:
  - name: restore-cache
    image: drillster/drone-volume-cache
    settings:
      restore: true
      mount:
        - ./node_modules
    volumes:
      - name: node_modules_cache
        path: /cache

  - name: build
    image: node:20-alpine
    environment:
      NODE_OPTIONS: --max_old_space_size=4096
      NEXT_TELEMETRY_DISABLED: 1
    commands:
      - 'npm i -g pnpm'
      - 'pnpm install --no-frozen-lockfile'
      - 'npm run build:ci'

    depends_on:
      - restore-cache
    volumes:
      - name: shiro-env
        path: /drone/src/.env

  - name: rebuild-cache
    image: drillster/drone-volume-cache
    settings:
      rebuild: true
      mount:
        - ./node_modules
    volumes:
      - name: node_modules_cache
        path: /cache

    depends_on:
      - build

  - name: package
    image: node:20-alpine
    commands:
      - 'apk add zip'
      - 'sh ./standalone-bundle.sh'
      - 'find .next/standalone/.next/static/css -maxdepth 1 -type f | head -n 5'
      - 'find .next/_next/static/css -maxdepth 1 -type f | head -n 5'
      - 'test -n "$(find .next/standalone/.next/static/css -maxdepth 1 -type f -name "*.css" -print -quit)"'
      - 'test -n "$(find .next/_next/static/css -maxdepth 1 -type f -name "*.css" -print -quit)"'
      - 'test -n "$(find .next/standalone/.next/static/chunks/app -type f -name "*.js" -print -quit)"'
    volumes:
      - name: shiro-dist
        path: /drone/src/assets

    depends_on:
      - build

trigger:
  branch:
    - main
  event:
    include:
      - push
---
kind: pipeline
name: demo-deploy
platform:
  os: linux
  arch: amd64

volumes:
  - name: shiro-dist
    host:
      path: /drone/tmp/shiro-dist

steps:
  - name: transfer file
    image: appleboy/drone-scp
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_username
      key:
        from_secret: ssh_key
      port: 22
      target: /home/deploy/shiro
      source:
        - assets/release.zip
      rm_target: true
      strip_components: 1
      debug: true
    volumes:
      - name: shiro-dist
        path: /drone/src/assets

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_username
      key:
        from_secret: ssh_key
      port: 22
      script:
        - 'npm install --os=linux --cpu=x64 sharp --registry=https://registry.npmmirror.com'
        - cd ~/shiro
        - rm -rf _next
        - rm -rf standalone
        - unzip -o release.zip
        - rm release.zip
        - cd standalone
        - cp -r ~/node_modules/sharp ./node_modules
        - ~/.n/bin/pm2 restart ecosystem.config.js
      debug: true
    depends_on:
      - transfer file

depends_on:
  - demo-build-and-package
trigger:
  branch:
    - main
  event:
    include:
      - push
