<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiro Docs · Not Found</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="hero">
        <p class="eyebrow">404</p>
        <div class="hero-grid">
          <div>
            <h1>文档页面不存在</h1>
            <p class="hero-copy">
              这个路径下没有可用内容。你可以回到文档首页，或者直接打开当前仓库的 Storybook。
            </p>
            <div class="hero-actions">
              <a class="button primary" href="./">返回首页</a>
              <a class="button secondary" href="./storybook/">打开 Storybook</a>
            </div>
          </div>
          <div class="hero-card">
            <p class="hero-card-title">可尝试的入口</p>
            <ul class="hero-list">
              <li>文档首页</li>
              <li>Storybook 组件预览</li>
              <li>GitHub 仓库 README</li>
            </ul>
          </div>
        </div>
      </main>
    </div>
